version: 2

models:
  - name: int_user_sessions
    description: User events grouped into sessions using a 30-minute inactivity rule.

    columns:
      - name: session_id
        description: Sequential session number for each user.
        tests:
          - not_null

      - name: user_id
        tests:
          - not_null

      - name: event_timestamp
        tests:
          - not_null