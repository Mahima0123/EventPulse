version: 2

models:

  - name: dim_users
    description: One record per user.

    columns:

      - name: user_id
        description: Unique user identifier.
        tests:
          - unique
          - not_null

      - name: country
        description: User's latest known country.

      - name: subscription_type
        description: User subscription plan.
      
  - name: dim_content
    description: One record per content item.

    columns:

      - name: content_id
        description: Unique content identifier.
        tests:
          - unique
          - not_null

      - name: total_events
        description: Number of events generated for this content.